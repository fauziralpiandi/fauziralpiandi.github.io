baseURL = "https://fauziralpiandi.github.io/"
defaultContentLanguage = "id"

paginate = 10

buildDrafts = false
buildFuture = false

[imaging]
  anchor = 'Center'

[taxonomies]
  author = "authors"
  tag = "tags"

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = [ "HTML", "RSS", "JSON" ]

[related]
  threshold = 0

[[related.indices]]
  name = "authors"
  weight = 100

[[related.indices]]
  name = "tags"
  weight = 75

[[related.indices]]
  name = "date"
  weight = 10

[[related.indices]]
  applyFilter = true
  name = 'fragmentrefs'
  type = 'fragments'
  weight = 10
